<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turn conversations into stories instantly</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 2rem; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('images/download.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eee; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            height: fit-content;
        }

        h2 { text-align: center; margin-top: 0; color: #fff; font-weight: 300; letter-spacing: 1px;}
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;}
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
        }
        
        #startBtn { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: white; }
        #startBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        #startBtn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        #stopBtn { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: white; }
        #stopBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 8, 68, 0.4); }
        #stopBtn:disabled { background: #444; color: #888; cursor: not-allowed; }

        canvas { 
            width: 100%; 
            height: 100px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #transcript { 
            padding: 15px; 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 8px; 
            white-space: pre-wrap; 
            min-height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        
        audio { width: 100%; margin-top: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎙️ Turn conversations into stories instantly</h2>
        
        <div class="controls">
            <select id="micSelect">
                <option value="">Requesting microphone permissions</option>
            </select>
        </div>

        <div class="controls">
            <button id="startBtn">Start Recording</button>
            <button id="stopBtn" disabled>Stop & Process</button>
        </div>
        
        <canvas id="visualizer"></canvas>

        <div id="transcript">Waiting for audio</div>
        
        <audio id="audioPlayback" controls style="display: none;"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
